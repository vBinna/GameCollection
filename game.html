<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Games Collection</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <text y='0.9em' font-size='90'>🎮</text>
  </svg>">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <a class="back" href="index.html">⬅ Back</a>

  <h1 id="gameTitle">Loading...</h1>

  <div class="frame-wrapper" id="wrapper">
    <iframe id="gameFrame"></iframe>
  </div>

  <p class="desc" id="gameDesc"></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const games = {
      1: {
        title: "Birdy!",
        src: "games/Birdy!/index.html",
        desc: "Simple Basic :D"
      },
      2: {
        title: "Super Birdy!",
        src: "games/SuperBirdy!/index.html",
        desc: "Jump! Avoid Pipes! Playable from mobiles!"
      },
      3: {
        title: "Coins!",
        src: "games/PressOnCoins/index.html",
        desc: ""
      }
    };

    const game = games[id];

    if (game) {
      document.getElementById("gameTitle").innerText =
        game.title || "Coming Soon";

      document.getElementById("gameDesc").innerText =
        game.desc || "";

      if (game.src) {
        document.getElementById("gameFrame").src = game.src;
      } else {
        document.getElementById("wrapper").style.display = "none";
      }
    } else {
      document.body.innerHTML = "<h1>Game not found</h1>";
    }

    function resizeGame() {
      const scale = Math.min(
        window.innerWidth / 1920,
        window.innerHeight / 1080
      );

      document.getElementById("wrapper").style.transform =
        `scale(${scale})`;
    }

    window.addEventListener("resize", resizeGame);
    resizeGame();
  </script>

</body>
</html>
